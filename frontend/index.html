<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinTelligence — Financial Intelligence Platform</title>
    <meta name="description" content="Enterprise AI financial dashboard" />
    <!--
      No <link> to CSS here — Tailwind is injected by Vite during dev,
      and compiled into the bundle during production build.
    -->
  </head>
  <body>
    <!-- React mounts into this div -->
    <div id="root"></div>

    <!--
      Vite processes this script tag. During dev it serves the module
      directly. During build it bundles and hashes the output filename.
    -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
